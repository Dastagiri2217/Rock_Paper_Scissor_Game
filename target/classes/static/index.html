<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --border: #2a2a5a;
      --accent: #00f5ff;
      --accent2: #ff006e;
      --accent3: #ffe600;
      --win: #00ff88;
      --lose: #ff4466;
      --draw: #ffaa00;
      --text: #e0e0ff;
      --muted: #6060a0;
      --glow: 0 0 20px rgba(0,245,255,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,0,110,0.04) 0%, transparent 60%);
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(14px, 3vw, 22px);
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,245,255,0.6), 0 0 60px rgba(0,245,255,0.3);
      letter-spacing: 2px;
      line-height: 1.6;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 30px rgba(0,245,255,0.6); }
      50% { text-shadow: 0 0 50px rgba(0,245,255,0.9), 0 0 80px rgba(0,245,255,0.4); }
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 22px;
      text-align: center;
      transition: all 0.3s;
    }

    .stat-chip .label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
    }

    .stat-chip .value {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      display: block;
      margin-top: 4px;
    }

    .stat-chip.wins .value { color: var(--win); }
    .stat-chip.losses .value { color: var(--lose); }
    .stat-chip.draws .value { color: var(--draw); }
    .stat-chip.total .value { color: var(--accent); }
    .stat-chip.rate .value { color: var(--accent3); }

    /* GAME ARENA */
    .arena {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 28px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .arena::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(0,245,255,0.1), transparent, rgba(255,0,110,0.1));
      pointer-events: none;
    }

    .versus-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .player-side {
      flex: 1;
      text-align: center;
    }

    .player-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .move-display {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto;
      border: 2px solid var(--border);
      background: var(--bg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
    }

    .move-display.player-move {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,245,255,0.2);
    }

    .move-display.computer-move {
      border-color: var(--accent2);
      box-shadow: 0 0 20px rgba(255,0,110,0.2);
    }

    .move-display.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-15deg) scale(1.1); }
      40% { transform: rotate(15deg) scale(1.2); }
      60% { transform: rotate(-10deg) scale(1.1); }
      80% { transform: rotate(10deg); }
    }

    .vs-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--accent3);
      text-shadow: 0 0 15px rgba(255,230,0,0.6);
      flex-shrink: 0;
    }

    /* RESULT MESSAGE */
    .result-message {
      text-align: center;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .result-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2.5vw, 14px);
      padding: 14px 24px;
      border-radius: 10px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
      line-height: 1.6;
    }

    .result-text.show { opacity: 1; transform: translateY(0); }
    .result-text.win { color: var(--win); border: 1px solid var(--win); background: rgba(0,255,136,0.06); text-shadow: 0 0 20px rgba(0,255,136,0.5); }
    .result-text.lose { color: var(--lose); border: 1px solid var(--lose); background: rgba(255,68,102,0.06); }
    .result-text.draw { color: var(--draw); border: 1px solid var(--draw); background: rgba(255,170,0,0.06); }

    /* MOVE BUTTONS */
    .move-section {
      text-align: center;
    }

    .move-section h3 {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .move-buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .move-btn {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 24px;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 100px;
      position: relative;
      overflow: hidden;
    }

    .move-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 14px;
    }

    .move-btn.rock::before { background: radial-gradient(circle, rgba(0,245,255,0.15), transparent 70%); }
    .move-btn.paper::before { background: radial-gradient(circle, rgba(255,0,110,0.15), transparent 70%); }
    .move-btn.scissors::before { background: radial-gradient(circle, rgba(255,230,0,0.15), transparent 70%); }

    .move-btn:hover::before { opacity: 1; }
    .move-btn:hover { transform: translateY(-4px) scale(1.05); }

    .move-btn.rock:hover { border-color: var(--accent); box-shadow: 0 8px 30px rgba(0,245,255,0.25); }
    .move-btn.paper:hover { border-color: var(--accent2); box-shadow: 0 8px 30px rgba(255,0,110,0.25); }
    .move-btn.scissors:hover { border-color: var(--accent3); box-shadow: 0 8px 30px rgba(255,230,0,0.25); }

    .move-btn:active { transform: translateY(0) scale(0.97); }

    .move-btn .emoji { font-size: 36px; }
    .move-btn .name { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    .move-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* HISTORY & CONTROLS */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
    }

    .history-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .history-panel h3 {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow-y: auto;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg);
      font-size: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .history-item .moves { flex: 1; color: var(--muted); }
    .history-item .badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .badge.WIN { background: rgba(0,255,136,0.15); color: var(--win); }
    .badge.LOSE { background: rgba(255,68,102,0.15); color: var(--lose); }
    .badge.DRAW { background: rgba(255,170,0,0.15); color: var(--draw); }

    .empty-history {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      font-style: italic;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .reset-btn {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      border-radius: 10px;
      padding: 12px 20px;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .reset-btn:hover {
      background: rgba(255,0,110,0.1);
      box-shadow: 0 0 15px rgba(255,0,110,0.2);
    }

    /* Error banner */
    .error-banner {
      background: rgba(255,68,102,0.15);
      border: 1px solid var(--lose);
      color: var(--lose);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    /* Connection indicator */
    .conn-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 14px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.3s;
    }

    .conn-dot.connected { background: var(--win); box-shadow: 0 0 8px rgba(0,255,136,0.6); animation: pulse 2s infinite; }
    .conn-dot.error { background: var(--lose); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 600px) {
      .bottom-row { grid-template-columns: 1fr; }
      .controls { flex-direction: row; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="game-title">ROCK · PAPER · SCISSORS</div>
    <div class="subtitle">vs. The Machine</div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-chip total">
      <span class="label">Played</span>
      <span class="value" id="stat-total">0</span>
    </div>
    <div class="stat-chip wins">
      <span class="label">Wins</span>
      <span class="value" id="stat-wins">0</span>
    </div>
    <div class="stat-chip losses">
      <span class="label">Losses</span>
      <span class="value" id="stat-losses">0</span>
    </div>
    <div class="stat-chip draws">
      <span class="label">Draws</span>
      <span class="value" id="stat-draws">0</span>
    </div>
    <div class="stat-chip rate">
      <span class="label">Win Rate</span>
      <span class="value" id="stat-rate">0%</span>
    </div>
  </div>

  <!-- Error Banner -->
  <div class="error-banner" id="error-banner">
    ⚠ Cannot connect to server. Make sure Spring Boot is running on port 8080.
  </div>

  <!-- Arena -->
  <div class="arena">
    <!-- VS Display -->
    <div class="versus-row">
      <div class="player-side">
        <div class="player-label">You</div>
        <div class="move-display player-move" id="player-display">❓</div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="player-side">
        <div class="player-label">Computer</div>
        <div class="move-display computer-move" id="computer-display">❓</div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-message">
      <div class="result-text" id="result-text">Choose your move!</div>
    </div>

    <!-- Move Buttons -->
    <div class="move-section">
      <h3>Choose Your Move</h3>
      <div class="move-buttons">
        <button class="move-btn rock" onclick="playMove('ROCK')">
          <span class="emoji">🪨</span>
          <span class="name">Rock</span>
        </button>
        <button class="move-btn paper" onclick="playMove('PAPER')">
          <span class="emoji">📄</span>
          <span class="name">Paper</span>
        </button>
        <button class="move-btn scissors" onclick="playMove('SCISSORS')">
          <span class="emoji">✂️</span>
          <span class="name">Scissors</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="bottom-row">
    <div class="history-panel">
      <h3>⚡ Recent Battles</h3>
      <div class="history-list" id="history-list">
        <div class="empty-history">No games yet. Make your first move!</div>
      </div>
    </div>
    <div class="controls">
      <button class="reset-btn" onclick="resetGame()">🗑 Reset Stats</button>
    </div>
  </div>
</div>

<!-- Connection Indicator -->
<div class="conn-indicator">
  <div class="conn-dot" id="conn-dot"></div>
  <span id="conn-text">Connecting...</span>
</div>

<script>
  const API = 'http://localhost:8080/api/game';

  const EMOJIS = { ROCK: '🪨', PAPER: '📄', SCISSORS: '✂️' };

  let isPlaying = false;

  // ---- Health Check on Load ----
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      if (res.ok) {
        document.getElementById('conn-dot').className = 'conn-dot connected';
        document.getElementById('conn-text').textContent = 'Connected';
        loadStats();
        loadHistory();
      } else throw new Error();
    } catch {
      document.getElementById('conn-dot').className = 'conn-dot error';
      document.getElementById('conn-text').textContent = 'Disconnected';
      document.getElementById('error-banner').style.display = 'block';
    }
  }

  // ---- Play a Move ----
  async function playMove(move) {
    if (isPlaying) return;
    isPlaying = true;
    setButtonsDisabled(true);

    // Show animated question marks while "thinking"
    const playerDisplay = document.getElementById('player-display');
    const computerDisplay = document.getElementById('computer-display');
    const resultText = document.getElementById('result-text');

    playerDisplay.textContent = EMOJIS[move];
    playerDisplay.classList.add('shake');
    computerDisplay.textContent = '🤔';
    computerDisplay.classList.add('shake');
    resultText.className = 'result-text';
    resultText.textContent = '...';

    try {
      const res = await fetch(`${API}/play`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ move })
      });

      if (!res.ok) throw new Error('Server error');
      const data = await res.json();

      // Slight delay for suspense
      await delay(400);

      computerDisplay.textContent = EMOJIS[data.computerMove] || '❓';
      computerDisplay.classList.remove('shake');
      playerDisplay.classList.remove('shake');

      // Show result
      const resultClass = data.result.toLowerCase();
      resultText.className = `result-text ${resultClass} show`;
      resultText.textContent = data.message;

      // Update stats & history
      await loadStats();
      await loadHistory();

      document.getElementById('error-banner').style.display = 'none';
    } catch (err) {
      computerDisplay.textContent = '❌';
      resultText.className = 'result-text lose show';
      resultText.textContent = '⚠ Could not reach server!';
      document.getElementById('error-banner').style.display = 'block';
    }

    isPlaying = false;
    setButtonsDisabled(false);
  }

  // ---- Load Stats ----
  async function loadStats() {
    try {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById('stat-total').textContent = data.totalGames;
      document.getElementById('stat-wins').textContent = data.wins;
      document.getElementById('stat-losses').textContent = data.losses;
      document.getElementById('stat-draws').textContent = data.draws;
      document.getElementById('stat-rate').textContent = data.winRate + '%';
    } catch {}
  }

  // ---- Load History ----
  async function loadHistory() {
    try {
      const res = await fetch(`${API}/history`);
      const games = await res.json();
      const list = document.getElementById('history-list');

      if (!games.length) {
        list.innerHTML = '<div class="empty-history">No games yet. Make your first move!</div>';
        return;
      }

      list.innerHTML = games.map(g => `
        <div class="history-item">
          <span>${EMOJIS[g.playerMove] || g.playerMove}</span>
          <span class="moves">You ${g.playerMove} vs CPU ${g.computerMove}</span>
          <span class="badge ${g.result}">${g.result}</span>
        </div>
      `).join('');
    } catch {}
  }

  // ---- Reset ----
  async function resetGame() {
    if (!confirm('Reset all stats and game history?')) return;
    try {
      await fetch(`${API}/reset`, { method: 'DELETE' });
      document.getElementById('player-display').textContent = '❓';
      document.getElementById('computer-display').textContent = '❓';
      const rt = document.getElementById('result-text');
      rt.className = 'result-text';
      rt.textContent = 'Choose your move!';
      await loadStats();
      await loadHistory();
    } catch {
      alert('Could not reset. Is the server running?');
    }
  }

  function setButtonsDisabled(disabled) {
    document.querySelectorAll('.move-btn').forEach(b => b.disabled = disabled);
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // Init
  checkHealth();
</script>
</body>
</html>
